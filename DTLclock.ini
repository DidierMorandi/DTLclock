; DTLclock.ini
; Constantes de paramétrage extraites de DTLclock.py (v1.6.0)
; Toutes les coordonnées sont exprimées dans le repère de l'image source
; (1080 x 1920), sauf mention contraire.
;
; NB : HOUR_HAND_PROFILE et MINUTE_HAND_PROFILE (profils de forme des
; aiguilles, listes de tuples) et BELLS (dictionnaire heure -> fichier wav)
; ne sont pas inclus ici : ce sont des structures, pas des scalaires, et un
; simple .ini les représenterait mal. A voir ensemble comment les migrer
; (section répétée, ou JSON séparé) si tu veux vraiment tout sortir du code.

[general]
; Numéro de version affiché dans le titre de la fenêtre.
VERSION = 1.6.0

[couleurs]
; Couleur de fond de la fenêtre et du canvas.
BACKGROUND_COLOR = #efe4b0

; Couleur du texte.
TEXT_COLOR = #17130c

; Couleur de fond du panneau des horaires (bandeau silencieux).
PANEL_BACKGROUND = #eadca5

[balancier]
; Position X du pivot du balancier, coordonnées image source.
PENDULUM_PIVOT_X = 548

; Position Y du pivot du balancier, coordonnées image source.
PENDULUM_PIVOT_Y = 950

; Longueur de la tige du balancier (pivot au centre de la lentille).
PENDULUM_ROD_LENGTH = 395

; Rayon de la lentille (bob) du balancier.
PENDULUM_BOB_RADIUS = 74

; Amplitude maximale de l'oscillation, en degrés de part et d'autre du repos.
PENDULUM_MAX_ANGLE = 7

; Durée d'un cycle complet aller-retour du balancier, en secondes.
PENDULUM_PERIOD_SECONDS = 2.0

; Délai entre deux images d'animation du balancier, en millisecondes.
PENDULUM_FRAME_DELAY_MS = 16

; Ecartement latéral des deux branches parallèles fines de part et d'autre
; de la tige centrale (motif "gridiron"), en coordonnées de l'image source.
PENDULUM_SIDE_ROD_OFFSET = 9

; Position (fraction de la longueur visible de la tige, 0 = pivot,
; 1 = bord de la lentille) des petites traverses décoratives reliant les
; deux branches latérales. Valeur multiple (tuple) : à traiter à part si le
; format .ini doit la porter (ex : liste séparée par virgules).
PENDULUM_CROSSBAR_FRACTIONS = 0.28, 0.55, 0.82

[cadran]
; Position du centre du cadran dans l'image source.
DIAL_CENTER_X = 550
DIAL_CENTER_Y = 540

; Longueur de l'aiguille des heures.
HOUR_HAND_LENGTH = 86

; Longueur de l'aiguille des minutes.
MINUTE_HAND_LENGTH = 124

; Longueur de l'aiguille des secondes.
SECOND_HAND_LENGTH = 132

; Fréquence de rafraîchissement de l'affichage du cadran, en millisecondes.
CLOCK_REFRESH_MS = 200

[bouton_rose]
; Bouton caché dans la rose centrale du socle : position X, Y et rayon
; de la zone cliquable.
ROSE_BUTTON_X = 546
ROSE_BUTTON_Y = 1650
ROSE_BUTTON_RADIUS = 14

[compartiment]
; Compartiment central du socle (zone du panneau des horaires),
; exprimé dans le repère 1080 x 1920.
COMPARTMENT_LEFT = 320
COMPARTMENT_TOP = 1520
COMPARTMENT_RIGHT = 770
COMPARTMENT_BOTTOM = 1810

[tableau_horaires]
; Le tableau des horaires occupe une fraction du compartiment et reste
; toujours centré dedans.
SCHEDULE_WIDTH_RATIO = 0.68
SCHEDULE_HEIGHT_RATIO = 0.52
